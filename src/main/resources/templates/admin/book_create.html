<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin-layout}"
      th:with="activeMenu='books'">
<head>
    <title>도서 추가</title>
</head>
<body>
<section layout:fragment="page-content">
    <div class="form-container">
        <h2 style="text-align: center;">📚 새 도서 추가</h2>
        <form th:action="@{/admin/books}" method="post" enctype="multipart/form-data">

            <label for="isbn">ISBN</label>
            <input type="text" id="isbn" name="isbn" required />

            <label for="title">제목</label>
            <input type="text" id="title" name="title" required />

            <label for="author">저자</label>
            <input type="text" id="author" name="author" required />

            <label for="publisher">출판사</label>
            <input type="text" id="publisher" name="publisher" required />

            <label for="publicationDate">출판일</label>
            <input type="date" id="publicationDate" name="publicationDate" required />

            <label for="pageCount">페이지 수</label>
            <input type="number" id="pageCount" name="pageCount" min="0" />

            <label for="imageFile">이미지 업로드</label>
            <input type="file" id="imageFile" name="imageFile" accept="image/*" />

            <label for="description">설명</label>
            <textarea id="description" name="description" rows="4"></textarea>

            <label for="originalPrice">정가</label>
            <input type="number" id="originalPrice" name="originalPrice" step="0.01" required />

            <label for="sellingPrice">판매가</label>
            <input type="number" id="sellingPrice" name="sellingPrice" step="0.01" required />

            <label for="giftWrappingAvailable">선물 포장 가능 여부</label>
            <select id="giftWrappingAvailable" name="giftWrappingAvailable">
                <option value="true">가능</option>
                <option value="false" selected>불가능</option>
            </select>

            <label>카테고리 선택</label>
            <div id="category-selects" style="margin-top: 0.5rem;"></div>
            <button type="button" id="add-category-btn" class="btn btn--secondary" style="margin-top: 0.5rem;">+ 카테고리 추가</button>
            <ul id="selected-categories-list" style="list-style: none; padding-left: 0; margin-top: 1rem;"></ul>
            <input type="hidden" name="categories" id="categories" />

            <label for="tagNames">태그 (쉼표로 구분)</label>
            <input type="text" id="tagNames" name="tagNames" placeholder="예: Java, Spring, Backend" />

            <button type="submit" class="btn btn--primary">도서 등록</button>
        </form>
    </div>
</section>

<th:block layout:fragment="script">
    <script id="all-categories-data" type="application/json" th:text="${allCategoriesJson}"></script>

    <script th:src="@{/js/admin-category-selector.js}"></script>

    <script th:inline="javascript">
        let errorMsg = [[${errorMessage}]];
        if (errorMsg) {
            alert(errorMsg);
        }
    </script>
</th:block>
</body>
</html>
