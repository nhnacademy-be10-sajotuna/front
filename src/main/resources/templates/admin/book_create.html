<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:inline="javascript"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>도서 추가</title>
    <style>
        main {
            padding: 0 !important;
            background: linear-gradient(135deg, #f5f7fa, #dbe9f4) !important;
            display: block !important;
            justify-content: unset !important;
            align-items: unset !important;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        .admin-sidebar {
            width: 250px;
            background-color: #fff;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            height: calc(100vh - 60px);
            position: fixed;
            left: 0;
            top: 60px;
            overflow-y: auto;
        }

        .admin-sidebar h3 {
            color: #333;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 0.5rem;
        }

        .admin-sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .admin-sidebar-menu li {
            margin-bottom: 0.5rem;
        }

        .admin-sidebar-menu a {
            display: block;
            padding: 0.8rem 1rem;
            color: #666;
            text-decoration: none;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }

        .admin-sidebar-menu a:hover,
        .admin-sidebar-menu a.active {
            background-color: #4CAF50;
            color: white;
        }

        .admin-content {
            flex: 1;
            padding: 3rem 2rem;
            margin-left: 250px;
            width: calc(100% - 250px);
        }

        .form-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            border: 1px solid #ccc;
            border-radius: 0.5rem;
            background-color: white;
        }

        label {
            display: block;
            margin-top: 1rem;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.6rem;
            margin-top: 0.4rem;
            border-radius: 0.4rem;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 2rem;
            padding: 0.8rem 2rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 0.4rem;
            font-size: 1rem;
            cursor: pointer;
        }

        .category-select-wrapper {
            margin-top: 1rem;
        }

        @media (max-width: 768px) {
            .admin-sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }

            .admin-content {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>
<main layout:fragment="content">
    <div class="admin-container">
        <!-- 🧭 관리자 사이드바 -->
        <div class="admin-sidebar">
            <h3>관리자 메뉴</h3>
            <ul class="admin-sidebar-menu">
                <li><a href="/admin">대시보드</a></li>
                <li><a href="/admin/books" class="active">책 관리</a></li>
                <li><a href="/admin/orders">주문 관리</a></li>
                <li><a href="/admin/users">회원 관리</a></li>
                <li><a href="/admin/categories">카테고리 관리</a></li>
            </ul>
        </div>

        <!-- 📄 도서 추가 폼 -->
        <div class="admin-content">
            <div class="form-container">
                <h2>📚 도서 추가</h2>

                <form th:action="@{/admin/books}" method="post" enctype="multipart/form-data">
                <label>ISBN</label>
                    <input type="text" name="isbn" required />

                    <label>제목</label>
                    <input type="text" name="title" required />

                    <label>저자</label>
                    <input type="text" name="author" required />

                    <label>출판사</label>
                    <input type="text" name="publisher" required />

                    <label>출판일</label>
                    <input type="date" name="publicationDate" required />

                    <label>페이지 수</label>
                    <input type="number" name="pageCount" min="0" />

                    <label>이미지 업로드</label>
                    <input type="file" name="imageFile" accept="image/*" />

                    <label>설명</label>
                    <textarea name="description" rows="4"></textarea>

                    <label>정가</label>
                    <input type="number" name="originalPrice" step="0.01" required />

                    <label>판매가</label>
                    <input type="number" name="sellingPrice" step="0.01" required />

                    <label>선물 포장 가능 여부</label>
                    <select name="giftWrappingAvailable">
                        <option value="true">가능</option>
                        <option value="false" selected>불가능</option>
                    </select>

                    <label>카테고리 선택</label>
                    <div id="category-selects" class="category-select-wrapper"></div>
                    <input type="hidden" name="categories" id="categories" />

                    <label>태그 (쉼표로 구분)</label>
                    <input type="text" name="tagNames" placeholder="예: Java, Spring, Backend" />

                    <button type="submit">도서 등록</button>
                </form>
            </div>

            <div id="category-selects"></div>
            <input type="hidden" id="categories" name="categories" />
        </div>
    </div>

    <!-- 🧠 카테고리 JS 로직 -->
    <script>
        const allCategories = /*[[${allCategoriesJson}]]*/ '[]';
        const categories = JSON.parse(allCategories);

        const container = document.getElementById('category-selects');
        const hiddenInput = document.getElementById('categories');

        let selectedPath = [];

        function renderCategorySelect(parentId = null, depth = 0) {
            while (container.children.length > depth) {
                container.removeChild(container.lastChild);
                selectedPath.pop();
            }

            const filtered = categories.filter(c => parentId === null ? c.parentId === null : c.parentId === parentId);

            if (filtered.length === 0) {
                hiddenInput.value = selectedPath.join(',');
                return;
            }

            const select = document.createElement('select');
            select.innerHTML = `<option value="">선택하세요</option>`;

            filtered.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = c.name;
                select.appendChild(option);
            });

            select.addEventListener('change', () => {
                const selectedId = select.value ? parseInt(select.value) : null;
                if (selectedId !== null && !isNaN(selectedId)) {
                    selectedPath = selectedPath.slice(0, depth);
                    selectedPath.push(selectedId);
                    renderCategorySelect(selectedId, depth + 1);
                } else {
                    selectedPath = selectedPath.slice(0, depth);
                    hiddenInput.value = selectedPath.join(',');
                    while (container.children.length > depth + 1) {
                        container.removeChild(container.lastChild);
                    }
                }
            });

            container.appendChild(select);

            if (selectedPath.length > depth) {
                select.value = selectedPath[depth];
                renderCategorySelect(selectedPath[depth], depth + 1);
            }
        }

        renderCategorySelect();
    </script>
</main>
</body>
</html>
