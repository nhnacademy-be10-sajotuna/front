<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin-layout}"
      th:with="activeMenu='books'">
<head>
    <title>도서 수정</title>
</head>
<body>
<section layout:fragment="page-content">
    <div class="form-container">
        <h2 style="text-align: center;">📚 도서 수정</h2>
        <form th:action="@{'/admin/books/edit/' + ${book.isbn}}" method="post" enctype="multipart/form-data">

            <label for="isbn">ISBN</label>
            <input type="text" id="isbn" name="isbn" th:value="${book.isbn}" readonly />

            <label for="title">제목</label>
            <input type="text" id="title" name="title" th:value="${book.title}" required />

            <label for="author">저자</label>
            <input type="text" id="author" name="author" th:value="${book.author}" required />

            <label for="publisher">출판사</label>
            <input type="text" id="publisher" name="publisher" th:value="${book.publisher}" required />

            <label for="publicationDate">출판일</label>
            <input type="date" id="publicationDate" name="publicationDate" th:value="${book.publicationDate}" required />

            <label for="pageCount">페이지 수</label>
            <input type="number" id="pageCount" name="pageCount" th:value="${book.pageCount}" min="0" />

            <label>기존 이미지</label>
            <div>
                <img th:if="${book.imageUrl != null and !#strings.isEmpty(book.imageUrl)}"
                     th:src="${book.imageUrl}" alt="기존 이미지" style="max-height: 150px; border: 1px solid #ddd; border-radius: 4px;" />
                <span th:unless="${book.imageUrl != null and !#strings.isEmpty(book.imageUrl)}">이미지 없음</span>
            </div>
            <input type="hidden" name="imageUrl" th:value="${book.imageUrl}" />

            <label for="imageFile">이미지 변경 (선택)</label>
            <input type="file" id="imageFile" name="imageFile" accept="image/*" />

            <label for="description">설명</label>
            <textarea id="description" name="description" rows="4" th:text="${book.description}"></textarea>

            <label for="originalPrice">정가</label>
            <input type="number" id="originalPrice" name="originalPrice" th:value="${book.originalPrice}" step="0.01" required />

            <label for="sellingPrice">판매가</label>
            <input type="number" id="sellingPrice" name="sellingPrice" th:value="${book.sellingPrice}" step="0.01" required />

            <label for="giftWrappingAvailable">선물 포장 가능 여부</label>
            <select id="giftWrappingAvailable" name="giftWrappingAvailable">
                <option th:value="true" th:selected="${book.giftWrappingAvailable}">가능</option>
                <option th:value="false" th:selected="${!book.giftWrappingAvailable}">불가능</option>
            </select>

            <label>카테고리 선택</label>
            <div id="category-selects" style="margin-top: 0.5rem;"></div>
            <button type="button" id="add-category-btn" class="btn btn--secondary" style="margin-top: 0.5rem;">+ 카테고리 추가</button>
            <ul id="selected-categories-list" style="list-style: none; padding-left: 0; margin-top: 1rem;"></ul>
            <input type="hidden" name="categories" id="categories" />

            <label for="tagNames">태그 (쉼표로 구분)</label>
            <input type="text" id="tagNames" name="tagNames" th:value="${#strings.listJoin(book.getTags(), ',')}" placeholder="예: Java, Spring, Backend" />

            <button type="submit" class="btn btn--primary">도서 수정</button>
        </form>
    </div>
</section>

<th:block layout:fragment="script">
    <script id="all-categories-data" type="application/json" th:text="${allCategoriesJson}"></script>
    <script id="existing-categories-data" type="application/json" th:text="${existingCategoriesJson}"></script>

    <script th:src="@{/js/admin-category-selector.js}"></script>

    <script th:inline="javascript">
        let errorMsg = [[${errorMessage}]];
        if (errorMsg) {
            alert(errorMsg);
        }
    </script>
</th:block>
</body>
</html>
