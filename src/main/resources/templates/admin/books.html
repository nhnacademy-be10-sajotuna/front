<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>책 관리</title>
    <style>
        .container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2rem;
            table-layout: fixed; /* ✅ 고정된 테이블 레이아웃 */
        }

        th, td {
            padding: 1rem;
            border: 1px solid #ddd;
            text-align: center;
            font-size: 0.95rem;
            word-wrap: break-word;  /* ✅ 줄바꿈 가능하게 */
            word-break: break-word; /* ✅ 단어 단위로 잘라줄 수 있음 */
            white-space: normal;    /* ✅ nowrap이면 줄이 안 바뀜 → normal로 설정 */
        }

        th {
            background-color: #f4f4f4;
        }

        img {
            max-width: 80px;
            height: auto;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            color: white;
        }

        .btn-edit {
            background-color: #2196F3;
        }

        .btn-delete {
            background-color: #f44336;
        }

        .btn-add {
            display: inline-block;
            margin: 0 auto;
            background-color: #4CAF50;
            text-align: center;
        }

        .pagination {
            text-align: center;
            margin-top: 2rem;
        }

        .pagination a {
            margin: 0 0.3rem;
            text-decoration: none;
            color: #333;
        }

        .pagination .current {
            font-weight: bold;
            color: #2196F3;
        }
    </style>
</head>
<body>
<section layout:fragment="content">
    <div class="container">
        <h1>📚 도서 관리</h1>

        <table>
            <thead>
            <tr>
                <th>ISBN</th>
                <th>표지</th>
                <th>제목</th>
                <th>저자</th>
                <th>출판사</th>
                <th>출판일</th>
                <th>가격</th>
                <th>할인가</th>
                <th>조회수</th>
                <th>리뷰 수</th>
                <th>평점</th>
                <th>작업</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books.content}">
                <td th:text="${book.isbn}"></td>
                <td><img th:src="${book.imageUrl}" alt="책 표지"></td>
                <td th:text="${book.title}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.publisher}"></td>
                <td th:text="${book.publicationDate}"></td>
                <td th:text="${book.originalPrice} + '원'"></td>
                <td th:text="${book.sellingPrice} + '원'"></td>
                <td th:text="${book.viewCount}"></td>
                <td th:text="${book.reviewCount}"></td>
                <td th:text="${book.averageRating}"></td>
                <td>
                    <div class="button-group">
                        <a th:href="@{'/admin/books/edit/' + ${book.isbn}}" class="btn btn-edit">수정</a>
                        <form th:action="@{'/admin/books/delete/' + ${book.isbn}}" method="post" th:onsubmit="return confirm('정말 삭제하시겠습니까?')">
                            <button type="submit" class="btn btn-delete">삭제</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="pagination">
            <a th:if="${books.hasPrevious()}" th:href="@{|?page=${books.number - 1}|}">&laquo; 이전</a>
            <span class="current">[[${books.number + 1}]] / [[${books.totalPages}]]</span>
            <a th:if="${books.hasNext()}" th:href="@{|?page=${books.number + 1}|}">다음 &raquo;</a>
        </div>

        <div style="text-align: center; margin-top: 2rem;">
            <a th:href="@{/admin/books/create}" class="btn btn-add">➕ 도서 추가</a>
        </div>
    </div>
</section>
</body>
</html>
