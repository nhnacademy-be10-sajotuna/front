<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin-layout}"
      th:with="activeMenu='books'">
<head>
    <title>책 관리</title>
</head>
<body>
<section layout:fragment="page-content">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h1 class="page-header" style="margin-bottom: 0; text-align: left;">📚 도서 관리</h1>
        <div style="display: flex; gap: 0.5rem; align-items: center; margin-left: auto;">
            <!-- 🔍 import 키워드 입력 -->
            <form th:action="@{/admin/books/import}" method="post" style="display: flex; align-items: center; gap: 0.3rem;">
                <input type="text" name="keyword" placeholder="키워드" style="padding: 0.3rem 0.5rem;" />
                <button type="submit" class="btn btn--primary">import</button>
            </form>

            <!-- ➕ 도서 추가 -->
            <a th:href="@{/admin/books/create}" class="btn btn--primary">➕ 도서 추가</a>
        </div>
    </div>

    <table class="data-table">
        <thead>
        <tr>
            <th>ISBN</th>
            <th>표지</th>
            <th>제목</th>
            <th>저자</th>
            <th>출판사</th>
            <th>출판일</th>
            <th>가격</th>
            <th>할인가</th>
            <th>조회수</th>
            <th>리뷰 수</th>
            <th>평점</th>
            <th>작업</th>
        </tr>
        </thead>
        <tbody>
        <th:block th:if="${not #lists.isEmpty(books.content)}">
            <tr th:each="book : ${books.content}">
                <td th:text="${book.isbn}"></td>
                <td><img th:src="${#strings.isEmpty(book.imageUrl)} ? '/image/default.png' : ${book.imageUrl}" alt="책 표지" onerror="this.src='/image/logo.png'" /></td>
                <td th:text="${book.title}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.publisher}"></td>
                <td th:text="${#temporals.format(book.publicationDate, 'yyyy-MM-dd')}"></td>
                <td th:text="${#numbers.formatInteger(book.originalPrice, 1, 'COMMA')} + '원'"></td>
                <td th:text="${#numbers.formatInteger(book.sellingPrice, 1, 'COMMA')} + '원'"></td>
                <td th:text="${book.viewCount}"></td>
                <td th:text="${book.reviewCount}"></td>
                <td th:text="${book.averageRating}"></td>
                <td>
                    <div class="button-group">
                        <a th:href="@{'/admin/books/edit/' + ${book.isbn}}" class="btn btn--secondary">수정</a>
                        <form th:action="@{'/admin/books/delete/' + ${book.isbn}}" method="post" onsubmit="return confirm('정말 삭제하시겠습니까?')" style="display: inline;">
                            <button type="submit" class="btn btn--danger">삭제</button>
                        </form>
                    </div>
                </td>
            </tr>
        </th:block>
        <tr th:if="${#lists.isEmpty(books.content)}">
            <td colspan="12" style="padding: 2rem;">등록된 도서가 없습니다.</td>
        </tr>
        </tbody>
    </table>

    <div class="pagination" th:if="${books.totalPages > 1}">
        <a th:if="${books.hasPrevious()}" th:href="@{/admin/books(page=${books.number - 1})}">&laquo; 이전</a>

        <span th:each="pageNumber : ${#numbers.sequence(0, books.totalPages - 1)}">
            <a th:if="${pageNumber != books.number}" th:href="@{/admin/books(page=${pageNumber})}" th:text="${pageNumber + 1}"></a>
            <span th:if="${pageNumber == books.number}" class="current" th:text="${pageNumber + 1}"></span>
        </span>

        <a th:if="${books.hasNext()}" th:href="@{/admin/books(page=${books.number + 1})}">다음 &raquo;</a>
    </div>

</section>
</body>
</html>
