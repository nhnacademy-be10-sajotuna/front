<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin-layout}"
      th:with="activeMenu='coupons'">
<head>
    <title>쿠폰 관리</title>
</head>
<body>
<section layout:fragment="page-content">
    <h1 class="page-header">🎟️ 쿠폰 관리</h1>

    <div style="text-align: right; margin-bottom: 1rem;">
        <a th:href="@{/admin/coupons/create}" class="btn btn--primary">➕ 쿠폰 추가</a>
    </div>

    <table class="data-table">
        <thead>
        <tr>
            <th>쿠폰 이름</th>
            <th>쿠폰 유형</th>
            <th>쿠폰 정책</th>
            <th>할인률/금액</th>
            <th>최소 주문 금액</th>
            <th>최대 할인 금액</th>
            <th>유효 기간</th>
            <th>작업</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="coupon : ${coupons}">
            <td th:text="${coupon.name}"></td>
            <td th:text="${coupon.couponType}"></td>
            <td th:text="${coupon.policyType}"></td>
            <td th:text="${coupon.discountAmount}"></td>
            <td th:text="${coupon.minOrderAmount} + '원'"></td>
            <td th:text="${coupon.maxDiscountAmount} + '원'"></td>
            <td th:text="${coupon.validDays} + '일'"></td>
            <td>
                <div class="button-group">
                    <a th:href="@{'/admin/coupons/edit/' + ${coupon.id}}" class="btn btn--secondary">수정</a>
                    <form th:action="@{'/admin/coupons/delete/' + ${coupon.id}}" method="post" onsubmit="return confirm('정말 삭제하시겠습니까?')">
                        <button type="submit" class="btn btn--danger">삭제</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
