<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>관리자 홈</title>
    <style>
        .home-container {
            padding: 6rem 2rem;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: bold;
            color: #333;
            text-decoration: none;
            margin-bottom: 3rem;
            display: inline-block;
        }

        .admin-button-container {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .admin-button {
            background-color: #4CAF50;
            color: white;
            font-size: 1.2rem;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            text-decoration: none;
            display: inline-block;
            min-width: 200px;
        }

        .admin-button:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<section layout:fragment="content">
    <div class="home-container">
        <!-- 🏷️ 로고 -->
        <a th:href="@{/}" class="logo">북팡문고</a>

        <!-- 📚 관리자 버튼들 -->
        <div class="admin-button-container">
            <a th:href="@{/admin/books}" class="admin-button">📚 책 관리</a>
            <a th:href="@{/admin/orders}" class="admin-button">🧾 주문 관리</a>
        </div>
    </div>
</section>
</body>
</html>
