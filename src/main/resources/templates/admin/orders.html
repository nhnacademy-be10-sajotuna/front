<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin-layout}"
      th:with="activeMenu='orders'">
<head>
    <title>주문 관리</title>
</head>
<body>
<section layout:fragment="page-content">

    <h1 class="page-header">🧾 주문 관리</h1>

    <div style="margin-bottom: 1.5rem;">
        <label for="status-filter" style="margin-right: 0.5rem; font-weight: bold;">주문 상태:</label>
        <select id="status-filter" onchange="location.href='/admin/orders?status='+this.value">
            <option th:value="'ALL'"       th:selected="${status == 'ALL'}">전체</option>
            <option th:value="'PENDING'"   th:selected="${status == 'PENDING'}">결제 완료</option>
            <option th:value="'SHIPPED'"   th:selected="${status == 'SHIPPED'}">배송 중</option>
            <option th:value="'DELIVERED'" th:selected="${status == 'DELIVERED'}">배송 완료</option>
            <option th:value="'CANCELLED'" th:selected="${status == 'CANCELLED'}">주문 취소</option>
            <option th:value="'RETURNED'"  th:selected="${status == 'RETURNED'}">반품</option>
        </select>
    </div>

    <table class="data-table">
        <thead>
        <tr>
            <th>주문번호</th>
            <th>수령인</th>
            <th>배송 희망 날짜</th>
            <th>주문 금액</th>
            <th>주문 상태</th>
            <th>작업</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(orders.content)}">
            <td colspan="6" style="padding: 2rem;">표시할 주문이 없습니다.</td>
        </tr>
        <tr th:each="order : ${orders.content}">
            <td th:text="${order.orderNumber}"></td>
            <td th:text="${order.recipientName}"></td>
            <td th:text="${#temporals.format(order.expectedDeliveryDate, 'yyyy-MM-dd')}"></td>
            <td th:text="${#numbers.formatInteger(order.totalPrice, 1, 'COMMA') + '원'}"></td>
            <td th:switch="${order.status.name()}">
                <span th:case="'PENDING'">결제완료</span>
                <span th:case="'SHIPPED'">배송중</span>
                <span th:case="'DELIVERED'">배송완료</span>
                <span th:case="'RETURNED'">주문반품</span>
                <span th:case="'CANCELLED'">주문취소</span>
                <span th:case="*">기타</span>
            </td>
            <td>
                <form th:if="${order.status.name() == 'PENDING'}"
                      th:action="@{'/admin/orders/delivery/' + ${order.orderId}}" method="post"
                      onsubmit="return confirm('배송 중 상태로 변경하시겠습니까?')">
                    <button type="submit" class="btn btn--secondary">배송 처리</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="pagination" th:if="${orders.totalPages > 1}">
        <a th:if="${orders.hasPrevious()}"
           th:href="@{/admin/orders(page=${orders.number - 1}, status=${status})}">&laquo; 이전</a>

        <span th:each="pageNumber : ${#numbers.sequence(0, orders.totalPages - 1)}">
            <a th:if="${pageNumber != orders.number}"
               th:href="@{/admin/orders(page=${pageNumber}, status=${status})}"
               th:text="${pageNumber + 1}"></a>
            <span th:if="${pageNumber == orders.number}" class="current"
                  th:text="${pageNumber + 1}"></span>
        </span>

        <a th:if="${orders.hasNext()}"
           th:href="@{/admin/orders(page=${orders.number + 1}, status=${status})}">다음 &raquo;</a>
    </div>

</section>
</body>
</html>
