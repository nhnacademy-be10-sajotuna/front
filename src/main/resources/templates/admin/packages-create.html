<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin-layout}"
      th:with="activeMenu='packages'">
<head>
    <title>포장 추가</title>
</head>
<body>
<section layout:fragment="page-content">
    <div class="form-container">
        <h2 style="text-align: center;">🎁 책 포장 추가</h2>

        <form th:action="@{/admin/packages/create}" method="post">
            <label for="packaging">포장지</label>
            <input type="text" id="packaging" name="packaging" required />

            <label for="price">가격</label>
            <input type="number" id="price" name="price" min="0" required />

            <button type="submit" class="btn btn--primary">포장 등록</button>
        </form>
    </div>
</section>
</body>
</html>
