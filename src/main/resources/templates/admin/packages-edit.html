<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin-layout}"
      th:with="activeMenu='packages'">
<head>
    <title>포장 정보 수정</title>
</head>
<body>
<section layout:fragment="page-content">
    <div class="form-container">
        <h2 style="text-align: center;">🎁 책 포장 정보 수정</h2>

        <form th:action="@{'/admin/packages/edit/' + ${package.id}}" method="post">
            <label for="packaging">포장지</label>
            <input type="text" id="packaging" name="packaging" th:value="${package.packaging}" required />

            <label for="price">가격</label>
            <input type="number" id="price" name="price" min="0" th:value="${package.price}" required />

            <button type="submit" class="btn btn--primary">정보 수정</button>
        </form>
    </div>
</section>
</body>
</html>
