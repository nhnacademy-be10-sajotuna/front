<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin-layout}"
      th:with="activeMenu='packages'">
<head>
    <title>책 포장 관리</title>
</head>
<body>
<section layout:fragment="page-content">
    <h1 class="page-header">🎁 책 포장 관리</h1>

    <div style="text-align: right; margin-bottom: 1rem;">
        <a th:href="@{/admin/packages/create}" class="btn btn--primary">➕ 포장 추가</a>
    </div>

    <table class="data-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>포장지</th>
            <th>가격</th>
            <th>작업</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="package : ${packages}">
            <td th:text="${package.id}"></td>
            <td th:text="${package.packaging}"></td>
            <td th:text="${package.price} + '원'"></td>
            <td>
                <div class="button-group">
                    <a th:href="@{'/admin/packages/edit/' + ${package.id}}" class="btn btn--secondary">수정</a>
                    <form th:action="@{'/admin/packages/delete/' + ${package.id}}" method="post" onsubmit="return confirm('정말 삭제하시겠습니까?')">
                        <button type="submit" class="btn btn--danger">삭제</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
