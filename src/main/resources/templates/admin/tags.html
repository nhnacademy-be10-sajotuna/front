<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin-layout}"
      th:with="activeMenu='tags'">
<head>
    <title>태그 관리</title>
</head>
<body>
<section layout:fragment="page-content">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h1 class="page-header" style="margin-bottom: 0;">🏷️ 태그 관리</h1>

        <!-- ➕ 태그 추가 폼 -->
        <form th:action="@{/admin/tags}" method="post" style="display: flex; align-items: center; gap: 0.3rem;">
            <input type="text" name="tagName" placeholder="태그 이름" required style="padding: 0.3rem 0.5rem;" />
            <button type="submit" class="btn btn--primary">➕ 추가</button>
        </form>
    </div>

    <table class="data-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>태그 이름</th>
            <th>작업</th>
        </tr>
        </thead>
        <tbody>
        <th:block th:if="${not #lists.isEmpty(tags.content)}">
            <tr th:each="tag : ${tags.content}">
                <td th:text="${tag.id}"></td>
                <td th:text="${tag.tagName}"></td>
                <td>
                    <form th:action="@{'/admin/tags/' + ${tag.id}}" method="post"
                          onsubmit="return confirm('정말 삭제하시겠습니까?')" style="display: inline;">
                        <button type="submit" class="btn btn--danger">삭제</button>
                    </form>
                </td>
            </tr>
        </th:block>
        <tr th:if="${#lists.isEmpty(tags.content)}">
            <td colspan="3" style="padding: 2rem;">등록된 태그가 없습니다.</td>
        </tr>
        </tbody>
    </table>

    <!-- 페이징 -->
    <div class="pagination" th:if="${tags.totalPages > 1}">
        <a th:if="${tags.hasPrevious()}"
           th:href="@{/admin/tags(page=${tags.number - 1})}">&laquo; 이전</a>

        <span th:each="pageNumber : ${#numbers.sequence((tags.number / 10) * 10, T(java.lang.Math).min(((tags.number / 10) + 1) * 10 - 1, tags.totalPages - 1))}">
            <a th:if="${pageNumber != tags.number}"
               th:href="@{/admin/tags(page=${pageNumber})}"
               th:text="${pageNumber + 1}"></a>
            <span th:if="${pageNumber == tags.number}"
                  class="current" th:text="${pageNumber + 1}"></span>
        </span>

        <a th:if="${tags.hasNext()}"
           th:href="@{/admin/tags(page=${tags.number + 1})}">다음 &raquo;</a>
    </div>

</section>
</body>
</html>
