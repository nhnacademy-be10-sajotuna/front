<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${book.title} + ' - 북팡문고'">도서 상세</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/review.css}">
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --light-bg: #f8f9fa;
            --border-color: #dee2e6;
            --shadow-sm: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            --shadow-md: 0 0.25rem 0.5rem rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            --border-radius: 0;
            --transition: all 0.3s ease;
        }

        .book-page-wrapper {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .book-detail-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 3rem;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
            padding: 3rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .book-image {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }

        .book-image img {
            max-width: 100%;
            width: 320px;
            height: auto;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            transition: transform 0.3s ease;
            
            /* 이미지 화질 최적화 */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            
            /* 이미지 스케일링 최적화 */
            object-fit: contain;
            object-position: center;
            
            /* 안티에일리어싱 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            
            /* 고해상도 디스플레이 지원 */
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            
            /* 이미지 품질 우선 */
            image-rendering: high-quality;
        }

        .book-image img:hover {
            transform: scale(1.05);
        }

        .book-info {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .book-info h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: #2d3748;
            margin: 0;
            line-height: 1.2;
        }

        .book-meta {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            color: var(--secondary-color);
            font-size: 1rem;
        }

        .book-meta p {
            margin: 0;
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }

        .book-meta p:last-child {
            border-bottom: none;
        }

        .book-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .tag {
            display: inline-block;
            background: none;
            color: #007bff;
            padding: 0.3rem 0.8rem;
            font-size: 0.875rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .tag:hover {
            color: #0056b3;
            transform: scale(1.05);
        }

        .book-price {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            color: white;
            padding: 2rem;
            border-radius: var(--border-radius);
            margin: 2rem 0;
            text-align: center;
        }

        .book-price del {
            color: rgba(255, 255, 255, 0.7);
            margin-right: 1rem;
            font-size: 1.25rem;
        }

        .book-price strong {
            color: white;
            font-size: 2rem;
            font-weight: 700;
        }

        .book-price .discount-rate {
            display: inline-block;
            background: rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            margin-left: 1rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .cart-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            background: var(--light-bg);
            padding: 1rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
        }

        .quantity-selector label {
            font-weight: 600;
            color: var(--secondary-color);
        }

        .quantity-selector input[type="number"] {
            width: 80px;
            text-align: center;
            padding: 0.75rem;
            font-size: 1.125rem;
            font-weight: 600;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            background: white;
            transition: var(--transition);
        }

        .quantity-selector input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
        }

        .qty-btn {
            padding: 0.75rem 1rem;
            font-size: 1.25rem;
            font-weight: 700;
            border: none;
            background: var(--primary-color);
            color: white;
            cursor: pointer;
            border-radius: 0;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .qty-btn:hover {
            background: #0056b3;
            transform: scale(1.1);
        }

        .btn-cart {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 1.25rem 2rem;
            font-size: 1.125rem;
            font-weight: 700;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
        }

        .btn-cart:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-coupon {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
        }

        .btn-coupon:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .book-description-wrapper {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
            padding: 3rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }

        .book-description h2 {
            color: #2d3748;
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--primary-color);
        }

        .book-description p {
            line-height: 1.8;
            font-size: 1.125rem;
            color: #4a5568;
            margin: 0;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 2.5rem;
            border-radius: var(--border-radius);
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 3px solid var(--primary-color);
        }

        .modal-title {
            color: var(--primary-color);
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0;
        }

        .close {
            font-size: 2rem;
            font-weight: 700;
            color: var(--secondary-color);
            cursor: pointer;
            transition: var(--transition);
        }

        .close:hover {
            color: var(--danger-color);
        }

        .coupon-item {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            margin-bottom: 1rem;
            border: 2px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
        }

        .coupon-item:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .coupon-item.selected {
            background: linear-gradient(135deg, #e3f2fd 0%, #f0f8ff 100%);
            border-color: var(--primary-color);
            border-width: 3px;
        }

        .coupon-name {
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 0.75rem;
            font-size: 1.125rem;
        }

        .coupon-discount {
            color: var(--primary-color);
            font-weight: 700;
            margin-bottom: 0.75rem;
            font-size: 1.25rem;
        }

        .coupon-condition {
            color: var(--secondary-color);
            font-size: 0.95rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: flex-end;
        }

        .btn-modal {
            padding: 1rem 2rem;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
        }

        .btn-modal-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, #0056b3 100%);
            color: white;
        }

        .btn-modal-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-modal-secondary {
            background: linear-gradient(135deg, var(--secondary-color) 0%, #495057 100%);
            color: white;
        }

        .btn-modal-secondary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        @media (max-width: 992px) {
            .book-detail-container {
                grid-template-columns: 1fr;
                gap: 2rem;
                padding: 2rem;
            }
            
            .book-image {
                order: -1;
            }
            
            .book-info h1 {
                font-size: 1.875rem;
            }
        }

        @media (max-width: 768px) {
            .book-page-wrapper {
                padding: 1rem;
            }
            
            .book-detail-container,
            .book-description-wrapper
            {
                padding: 1.5rem;
            }
            
            .book-info h1 {
                font-size: 1.5rem;
            }
            
            .book-price {
                padding: 1.5rem;
            }
            
            .book-price strong {
                font-size: 1.5rem;
            }
            
            .modal-content {
                width: 95%;
                margin: 10% auto;
                padding: 1.5rem;
            }
            
            .actions {
                gap: 1rem;
            }
        }
    </style>
    <script defer>
        function changeQty(amount) {
            const qtyInput = document.getElementById("quantity");
            let current = parseInt(qtyInput.value) || 1;
            current += amount;
            if (current < 1) current = 1;
            qtyInput.value = current;
        }
    </script>
</head>
<body>
<main layout:fragment="content">
    <div class="book-page-wrapper">
        <!-- 책 상세 정보 (flex) -->
        <div class="book-detail-container">
            <div class="book-image">
                <img th:src="${book.imageUrl}" onerror="this.src='/image/logo.png'" alt="책 이미지" class="book-image" style="max-width: 100%; width: 250px; height: auto; box-shadow: var(--shadow-md); border-radius: 12px; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges;" />
            </div>

            <div class="book-info">
                <h1 th:text="${book.title}"></h1>

                <!-- ✅ 카테고리 표시 -->
                <div class="book-categories">
                    <span th:each="categoryList : ${book.categories}">
                        <span th:each="category : ${categoryList}" class="tag" th:text="'#' + ${category.name}"></span>
                    </span>
                </div>

                <div class="book-meta">
                    <p><strong>저자:</strong> <span th:text="${book.author}"></span></p>
                    <p><strong>출판사:</strong> <span th:text="${book.publisher}"></span></p>
                    <p><strong>출판일:</strong> <span th:text="${#temporals.format(book.publicationDate, 'yyyy-MM-dd')}"></span></p>
                </div>

                <div class="book-price">
                    <div th:if="${book.discountRate > 0}">
                        <del th:text="${#numbers.formatDecimal(book.originalPrice, 0, 0)} + '원'"></del>
                        <strong th:text="${#numbers.formatDecimal(book.sellingPrice, 0, 0)} + '원'"></strong>
                        <span class="discount-rate">
                            <span th:text="${#numbers.formatDecimal(book.discountRate, 0, 1)}"></span>% 할인
                        </span>
                    </div>
                    <div th:unless="${book.discountRate > 0}">
                        <strong th:text="${#numbers.formatDecimal(book.sellingPrice, 0, 0)} + '원'"></strong>
                    </div>
                </div>

                <div class="actions">
                    <form th:action="@{/cart}" method="post" class="cart-form">
                        <input type="hidden" name="isbn" th:value="${book.isbn}" />

                        <!-- 수량 선택 -->
                        <div class="quantity-selector">
                            <label for="quantity">수량:</label>
                            <button type="button" class="qty-btn" onclick="changeQty(-1)">-</button>
                            <input type="number" id="quantity" name="quantity" value="1" min="1" readonly />
                            <button type="button" class="qty-btn" onclick="changeQty(1)">+</button>
                        </div>

                        <!-- 장바구니 버튼 -->
                        <button type="submit" class="btn-cart">🛒 장바구니 담기</button>
                    </form>
                    <button type="button"
                            class="btn-coupon"
                            th:if="${user != null}"
                            th:data-isbn="${book.isbn}"
                            th:data-category-ids="${#strings.listJoin(categoryIds, ',')}">
                        🏷️ 쿠폰 확인
                    </button>
                </div>
            </div>
        </div>

        <!-- 책 설명: flex 밖에서 -->
        <div class="book-description-wrapper">
            <div class="book-description">
                <h2>책 소개</h2>
                <p th:utext="${book.description}"></p>
            </div>
        </div>

        <!-- 리뷰 목록: flex 밖에서 -->
        <div class="review-container review-list-container">
            <h2 class="review-container__title">리뷰 목록</h2>

            <div th:if="${message}" th:text="${message}" class="alert alert--success"></div>
            <div th:if="${errorMessage}" th:text="${errorMessage}" class="alert alert--error"></div>

            <div class="review-table-wrapper">
                <table class="review-table">
                    <thead>
                    <tr>
                        <th>평점</th>
                        <th>내용</th>
                        <th>사진</th>
                        <th>작성자</th>
                        <th>작성일</th>
                        <th>관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="review : ${reviews}">
                        <td>
                            <div class="review-table__stars" aria-label="평점" th:aria-label="|${review.rating}점|">
                                <span th:each="i : ${#numbers.sequence(1, 5)}"
                                      th:text="${i <= review.rating} ? '★' : '☆'"></span>
                            </div>
                        </td>
                        <td th:text="${review.content}" style="max-width: 400px; white-space: pre-wrap; word-break: break-word;"></td>
                        <td>
                            <img th:if="${review.filePath}" th:src="@{|/images/${review.filePath}|}" alt="리뷰 이미지"
                                 class="review-table__image" />
                            <span th:unless="${review.filePath}">-</span>
                        </td>
                        <td th:text="${review.maskedEmail}"></td>
                        <td th:text="${#temporals.format(review.postedAt, 'yyyy-MM-dd')}"></td>
                        <td>
                            <a th:if="${review.userId == #authentication.principal.id}"
                               th:href="@{|/reviews/${review.id}/edit?isbn=${isbn}|}"
                               class="btn btn--secondary">수정</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(reviews)}">
                        <td colspan="6" style="padding: 2.5rem; text-align: center;">등록된 리뷰가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="list-actions">
                <a th:if="${user != null}" th:href="@{|/reviews/create?isbn=${isbn}|}" class="btn btn--primary">리뷰 작성</a>
            </div>
        </div>
    </div>
    <!-- 쿠폰 선택 모달 -->
    <div id="couponModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">발급 가능한 쿠폰</h2>
                <span class="close" onclick="closeCouponModal()">&times;</span>
            </div>
            <div id="couponList"><!-- 동적 생성 --></div>
            <div class="modal-actions">
                <button type="button"
                        class="btn-modal btn-modal-secondary"
                        onclick="closeCouponModal()">확인</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" th:inline="javascript">

        const appliedCoupons = new Map();

        document.querySelectorAll('.btn-coupon').forEach(button => {
            button.addEventListener('click', function() {
                const isbn = this.dataset.isbn;
                const categoryIds = this.dataset.categoryIds;
                showCouponModal(isbn, categoryIds);
            });
        });

        function showCouponModal(isbn, categoryIds) {
            currentIsbn = isbn;
            document.querySelectorAll('input[name*=".isbn"]').forEach((inp, i) => {
                if (inp.value === isbn) currentProductIndex = i;
            });
            loadAvailableCoupons(isbn, categoryIds);
            document.getElementById('couponModal').style.display = 'block';
        }
        function loadAvailableCoupons(isbn, categoryIds) {
            const list = document.getElementById('couponList');
            list.innerHTML = '<div style="text-align:center;padding:2rem;">쿠폰 목록을 불러오는 중...</div>';

            // API 호출로 실제 쿠폰 데이터 가져오기
            const params = new URLSearchParams({
                isbn: isbn,
                categoryIds: categoryIds
            });

            fetch(`/api/coupons/book?${params}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('쿠폰 조회에 실패했습니다.');
                    }
                    return response.json();
                })
                .then(coupons => {
                    if (coupons.length === 0) {
                        list.innerHTML = '<div style="text-align:center;padding:2rem;color:#666;">적용 가능한 쿠폰이 없습니다.</div>';
                        return;
                    }

                    // 이미 적용된 쿠폰 ID들 수집
                    const appliedCouponIds = Array.from(appliedCoupons.values()).map(c => c.couponId);

                    let html = '';
                    coupons.forEach(c => {
                        console.log('Coupon data:', c); // 쿠폰 데이터 로그
                        const dt = c.policyType === 'RATE'
                            ? `${c.discountAmount / 10}% 할인`
                            : `${c.discountAmount.toLocaleString()}원 할인`;

                        const condition = c.minOrderAmount
                            ? `${c.minOrderAmount.toLocaleString()}원 이상 구매시`
                            : '제한 없음';

                        // maxDiscountAmount 정보 추가
                        const maxDiscountInfo = c.maxDiscountAmount && c.maxDiscountAmount > 0
                            ? ` (최대 ${c.maxDiscountAmount.toLocaleString()}원)`
                            : '';

                        const isApplied = appliedCouponIds.includes(c.id);
                        const appliedClass = isApplied ? ' style="opacity: 0.5; background-color: #f8f9fa;"' : '';
                        const appliedText = isApplied ? ' (이미 적용됨)' : '';
                        const onclick = isApplied ? '' : `onclick="selectCoupon(this, ${c.id}, '${c.name}', '${dt}', ${c.discountAmount}, '${c.policyType}', ${c.maxDiscountAmount || 0})"`;

                        html += `
                            <div class="coupon-item"${appliedClass} ${onclick}>
                                <div class="coupon-name">${c.name}${appliedText}</div>
                                <div class="coupon-discount">${dt}${maxDiscountInfo}</div>
                                <div class="coupon-condition">${condition}</div>
                            </div>
                        `;
                    });
                    list.innerHTML = html;
                })
                .catch(error => {
                    console.error('쿠폰 조회 실패:', error);
                    list.innerHTML = '<div style="text-align:center;padding:2rem;color:#dc3545;">쿠폰 조회에 실패했습니다.</div>';
                });
        }

        function selectCoupon(el, couponId, name, discountText, discountAmount, policyType, maxDiscountAmount) {
            // 발급 요청
            fetch(`/api/coupons/issue/${couponId}`, {
                method: 'POST'
            })
                .then(res => {
                    if (!res.ok) throw new Error('쿠폰 발급 실패');
                    return res.json();
                })
                .then(data => {
                    console.log('발급 성공:', data);

                    // 발급된 쿠폰 표시용 Map 저장
                    appliedCoupons.set(currentIsbn, {
                        couponId,
                        name,
                        discountText,
                        discountAmount,
                        policyType,
                        maxDiscountAmount
                    });

                    // UI 변경: 회색 처리 + "이미 적용됨" 텍스트 추가
                    el.style.opacity = '0.5';
                    el.style.backgroundColor = '#f8f9fa';
                    el.onclick = null;

                    const nameElem = el.querySelector('.coupon-name');
                    if (nameElem && !nameElem.innerText.includes('이미 적용됨')) {
                        nameElem.innerText += ' (이미 적용됨)';
                    }
                })
                .catch(err => {
                    console.error('쿠폰 발급 오류:', err);
                    alert('쿠폰 발급에 실패했습니다.');
                });
        }
        function closeCouponModal() {
            document.getElementById('couponModal').style.display = 'none';
            selectedCouponId = '';
        }

        window.onclick = function(e) {
            if (e.target.id === 'couponModal') closeCouponModal();
            if (e.target.id === 'orderCouponModal') closeOrderCouponModal();
        };

    </script>
</main>
</body>
