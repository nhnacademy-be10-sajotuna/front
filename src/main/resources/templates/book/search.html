<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>도서 검색</title>
    <link rel="stylesheet" href="/css/search.css">

</head>
<body>
<main layout:fragment="content">
<div class="search-container">
    <!-- 사이드바 -->
    <aside class="sidebar">
        <h3 class="sidebar-title">📚 카테고리 탐색</h3>
        <div class="category-tree" id="category-tree">
            <!-- 카테고리 트리가 동적으로 렌더링됩니다 -->
        </div>
    </aside>

    <div class="main-content">

        <div class="sort-tabs">
            <a th:href="@{/book/search(keyword=${keyword}, category=${category}, sort='popularity')}"
               th:classappend="${sort == 'popularity'} ? 'active'" class="sort-tab">인기도</a>
            <a th:href="@{/book/search(keyword=${keyword}, category=${category}, sort='newest')}"
               th:classappend="${sort == 'newest'} ? 'active'" class="sort-tab">신상품</a>
            <a th:href="@{/book/search(keyword=${keyword}, category=${category}, sort='lowestPrice')}"
               th:classappend="${sort == 'lowestPrice'} ? 'active'" class="sort-tab">최저가</a>
            <a th:href="@{/book/search(keyword=${keyword}, category=${category}, sort='highestPrice')}"
               th:classappend="${sort == 'highestPrice'} ? 'active'" class="sort-tab">최고가</a>
            <a th:href="@{/book/search(keyword=${keyword}, category=${category}, sort='averageRating')}"
               th:classappend="${sort == 'averageRating'} ? 'active'" class="sort-tab">평점</a>
            <a th:href="@{/book/search(keyword=${keyword}, category=${category}, sort='reviewCount')}"
               th:classappend="${sort == 'reviewCount'} ? 'active'" class="sort-tab">리뷰</a>
        </div>

        <ul class="book-list">
            <li th:each="book : ${books}">
                <img th:src="${book.imageUrl}" onerror="this.src='/image/logo.png'" alt="책 이미지" style="width:100px; height:auto; border-radius: 4px;"/>
                <div>
                    <div class="book-title" th:text="${book.title}">도서 제목</div>
                    <div class="book-meta">
                        <span th:text="'저자: ' + ${book.author}"></span><br/>

                        <!-- 할인율이 존재할 경우 -->
                        <span th:if="${book.originalPrice != null and book.originalPrice > 0 and ((book.originalPrice - book.sellingPrice) / book.originalPrice * 100.0) > 0.0}"
                              th:text="${#numbers.formatDecimal(book.originalPrice, 1, 0)} + '원 → '
                               + ${#numbers.formatDecimal(book.sellingPrice, 1, 0)} + '원 ('
                               + ${#numbers.formatDecimal((book.originalPrice - book.sellingPrice) / book.originalPrice * 100.0, 1, 1)} + '% 할인)'">
                </span>

                        <!-- 할인율이 0일 경우 -->
                        <span th:if="${book.originalPrice != null and book.originalPrice > 0 and ((book.originalPrice - book.sellingPrice) / book.originalPrice * 100.0) <= 0.0}"
                              th:text="${#numbers.formatDecimal(book.originalPrice, 1, 0)} + '원 → '
                               + ${#numbers.formatDecimal(book.sellingPrice, 1, 0)} + '원'">
                </span>

                        <!-- 원가 자체가 없는 경우 (즉, 원가 없이 판매가만 있는 경우) -->
                        <span th:if="${book.originalPrice == null or book.originalPrice == 0}"
                              th:text="'판매가: ' + ${#numbers.formatDecimal(book.sellingPrice, 1, 0)} + '원'">
                </span><br/>

                        <span th:text="'평점: ' + ${book.averageRating} + '점'"></span><br/>
                        <span th:text="'리뷰 수: ' + ${book.reviewCount} + '개'"></span><br/>
                        <span th:text="'발행일: ' + ${book.publishedDate}"></span>
                    </div>
                </div>
            </li>
        </ul>

        <div class="pagination-container" th:if="${page.totalPages > 1}">
            <ul class="pagination">
                <!-- 이전 페이지 -->
                <li th:classappend="${currentPage == 1} ? 'disabled'">
                    <a th:href="@{/book/search(keyword=${keyword}, category=${category}, sort=${sort}, page=${currentPage - 2}, size=${page.size})}">&lt;</a>
                </li>

                <!-- 페이지 번호 목록 (startPage ~ endPage) -->
                <li th:each="i : ${#numbers.sequence(startPage, endPage)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a th:href="@{/book/search(keyword=${keyword}, category=${category}, sort=${sort}, page=${i - 1}, size=${page.size})}"
                       th:text="${i}">1</a>
                </li>

                <!-- 다음 페이지 -->
                <li th:classappend="${currentPage == page.totalPages} ? 'disabled'">
                    <a th:href="@{/book/search(keyword=${keyword}, category=${category}, sort=${sort}, page=${currentPage}, size=${page.size})}">&gt;</a>
                </li>
            </ul>
        </div>

    </div>
</div>

</main>
<script src="/js/search.js"></script>
</body>
</html>
