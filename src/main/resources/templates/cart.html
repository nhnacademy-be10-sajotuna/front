<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>장바구니</title>
  <style>
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #ccc;
    }

    .cart-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .cart-right {
      text-align: right;
    }

    .cart-image {
      width: 80px;
      height: auto;
    }

    .cart-title {
      font-size: 18px;
      font-weight: bold;
    }

    .price-original {
      text-decoration: line-through;
      color: gray;
      font-size: 14px;
    }

    .price-selling {
      font-size: 16px;
      font-weight: bold;
      color: #e60023;
    }

    .summary {
      margin-top: 24px;
      font-size: 18px;
      font-weight: bold;
      text-align: right;
    }
  </style>
</head>
<body>
<div th:if="${#lists.isEmpty(cart.items)}">
  <p>장바구니가 비어있습니다.</p>
</div>

<div th:if="${!#lists.isEmpty(cart.items)}">
  <div th:each="item : ${cart.items}" class="cart-item">
    <div class="cart-left">
      <img th:src="${item.imageUrl}" alt="책 이미지" class="cart-image"/>
      <div>
        <div class="cart-title" th:text="${item.title}">책 제목</div>
        <div class="price-selling" th:text="${#numbers.formatDecimal(item.sellingPrice, 0, 'COMMA', 0, 'POINT')} + '원'">11,000원</div>
        <div class="price-original" th:text="${#numbers.formatDecimal(item.originalPrice, 0, 'COMMA', 0, 'POINT')} + '원'">13,000원</div>
      </div>
    </div>

    <div class="cart-right">
      <div>수량: <span th:text="${item.quantity}">1</span></div>
      <div>
        합계:
        <span th:text="${#numbers.formatDecimal(item.sellingPrice * item.quantity, 0, 'COMMA', 0, 'POINT')} + '원'">
                    22,000원
                </span>
      </div>
    </div>
  </div>

  <!-- 총합 표시 -->
  <div class="summary">
    총합:
    <span th:text="${
            #numbers.formatDecimal(
                cart.items.stream().mapToDouble(i -> i.sellingPrice * i.quantity).sum(),
                0, 'COMMA', 0, 'POINT')
        } + '원'">
            0원
        </span>
  </div>
</div>
</body>
</html>
