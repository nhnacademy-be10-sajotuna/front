<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>장바구니</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    .cart-container {
      display: flex;
      justify-content: space-between;
      max-width: 1000px;
      margin: auto;
      gap: 40px;
    }

    .cart-items {
      flex: 2;
    }

    .cart-summary {
      flex: 1;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      background-color: #fafafa;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
      padding: 15px 0;
    }

    .cart-item-name {
      font-weight: bold;
    }

    .quantity {
      font-size: 0.9rem;
      color: #555;
    }

    .price {
      font-weight: bold;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      font-size: 1rem;
    }

    .summary-row.total {
      font-weight: bold;
      font-size: 1.2rem;
    }

    .order-button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .order-button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
<div class="cart-container">
  <!-- 장바구니 리스트 -->
  <div class="cart-items">
    <h2>장바구니</h2>
    <div th:each="item : ${cart.items}" class="cart-item">
      <div>
        <div class="cart-item-name" th:text="${item.bookName}">책 제목</div>
        <div class="quantity" th:text="'수량: ' + ${item.quantity}">수량</div>
      </div>
      <div class="price" th:text="${item.price} + '원'">가격</div>
    </div>
  </div>

  <!-- 결제 정보 -->
  <div class="cart-summary">
    <h3>결제 정보</h3>
    <div class="summary-row">
      <span>배송비</span>
      <span th:text="${cart.deliveryFee} + '원'">배송비</span>
    </div>
    <div class="summary-row total">
      <span>결제 예정 금액</span>
      <span th:text="${cart.totalPrice} + '원'">총합</span>
    </div>
    <div class="summary-row">
      <span>적립 예정 포인트</span>
      <span th:text="${cart.rewardPoint} + 'P'">포인트</span>
    </div>
    <form th:action="@{/orders}" method="post">
      <button type="submit" class="order-button">주문하기</button>
    </form>
  </div>
</div>
</body>
</html>
