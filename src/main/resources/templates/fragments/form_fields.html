<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="reviewForm">
    <div class="form-group">
        <label class="form-group__label">평점</label>
        <div class="star-rating">
            <div class="star-rating__input">
                <input type="radio" id="rate5" th:field="*{rating}" value="5" required><label for="rate5" title="5점">★</label>
                <input type="radio" id="rate4" th:field="*{rating}" value="4" required><label for="rate4" title="4점">★</label>
                <input type="radio" id="rate3" th:field="*{rating}" value="3" required><label for="rate3" title="3점">★</label>
                <input type="radio" id="rate2" th:field="*{rating}" value="2" required><label for="rate2" title="2점">★</label>
                <input type="radio" id="rate1" th:field="*{rating}" value="1" required><label for="rate1" title="1점">★</label>
            </div>
            <span class="star-rating__display"></span>
        </div>
    </div>

    <div class="form-group">
        <label for="content" class="form-group__label">리뷰 내용</label>
        <textarea id="content" th:field="*{content}" class="form-group__control" required></textarea>
    </div>

    <div class="form-group">
        <label for="file" class="form-group__label">사진 첨부 (선택)</label>
        <input type="file" id="file" name="file" class="form-group__control" accept="image/*">
    </div>
</div>
</html>
