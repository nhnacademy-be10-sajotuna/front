<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>도서 메인</title>
    <link rel="stylesheet" href="/css/bookMain.css">
</head>
<body>
<main layout:fragment="content">
    <div class="main-container">
        <!-- 📂 상단 카테고리 드롭다운 -->
        <div class="category-dropdown">
            <button class="category-dropdown-btn">📚 분야별 카테고리</button>
            <div class="category-dropdown-content">
                <div th:each="parent : ${categories}" th:if="${parent.parentId == null}" class="category-section">
                    <div class="parent-category-title" th:text="${parent.name}"></div>
                    <ul class="child-category-menu">
                        <li th:each="child : ${categories}" th:if="${child.parentId == parent.id}">
                            <a th:href="@{/book/search(category=${child.id})}" th:text="${child.name}"></a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- 📘 도서 영역 -->
        <section class="book-section">
            <!-- 🌟 인기 도서 -->
            <div class="popular-section">
                <h2>인기 도서</h2>
                <div class="book-carousel" id="popular-carousel">
                    <button class="carousel-nav prev" onclick="moveCarousel('popular-carousel', -1)">‹</button>
                    <div class="book-carousel-inner" id="popular-carousel-inner">
                        <div class="book-item" th:each="book : ${popularBooks}">
                            <a th:href="@{'/book/detail/' + ${book.isbn}}">
                                <img th:src="${book.imageUrl}" onerror="this.src='/image/logo.png'" alt="도서 이미지"/>
                                <div class="book-title" th:text="${book.title}"></div>
                            </a>
                        </div>
                    </div>
                    <button class="carousel-nav next" onclick="moveCarousel('popular-carousel', 1)">›</button>
                </div>
            </div>

            <!-- 🆕 신간 도서 -->
            <div class="newest-section">
                <h2>신간 도서</h2>
                <div class="book-carousel" id="newest-carousel">
                    <button class="carousel-nav prev" onclick="moveCarousel('newest-carousel', -1)">‹</button>
                    <div class="book-carousel-inner" id="newest-carousel-inner">
                        <div class="book-item" th:each="book : ${newestBooks}">
                            <a th:href="@{'/book/detail/' + ${book.isbn}}">
                                <img th:src="${book.imageUrl}" onerror="this.src='/image/logo.png'" alt="도서 이미지"/>
                                <div class="book-title" th:text="${book.title}"></div>
                            </a>
                        </div>
                    </div>
                    <button class="carousel-nav next" onclick="moveCarousel('newest-carousel', 1)">›</button>
                </div>
            </div>
        </section>
    </div>

    <script src="/js/bookMain.js"></script>
</main>
<script src="/js/search.js"></script>
</body>
</html>
