<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>홈</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #74ebd5, #acb6e5);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .home-container {
            background-color: white;
            padding: 2.5rem;
            border-radius: 1.2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }

        .home-container h1 {
            margin-bottom: 2rem;
            color: #333;
        }

        .login-button {
            width: 100%;
            padding: 0.8rem;
            background-color: #5c9ded;
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-button:hover {
            background-color: #417fde;
        }
    </style>
</head>
<body>
<div class="home-container">
    <h1>환영합니다!</h1>
    <form th:action="@{/front/login}" method="get">
        <button type="submit" class="login-button">로그인하러 가기</button>
    </form>
</div>
</body>
</html>
