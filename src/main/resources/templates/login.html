<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #dbe9f4); /* ✅ 부드러운 밝은 그라디언트 */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background-color: white;
            padding: 3rem 2rem;
            border-radius: 1.2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* 🏷️ 북팡문고 로고 */
        .logo {
            display: block;
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            text-decoration: none;
            margin-bottom: 2rem;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: #333;
        }

        .input-group {
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center; /* input을 중앙 정렬 */
        }

        .input-group label {
            width: 80%;
            text-align: left; /* ✅ 왼쪽 정렬로 수정 */
            margin-bottom: 0.3rem;
            font-weight: 600;
            color: #555;
        }

        .input-group input {
            width: 80%;
            padding: 0.8rem;
            border-radius: 0.5rem;
            border: 1px solid #ccc;
            font-size: 1rem;
        }


        .login-button {
            margin-top: 1.2rem;
            width: 100%;
            padding: 0.9rem;
            background-color: #5c9ded;
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-button:hover {
            background-color: #417fde;
        }

        .register-link {
            margin-top: 1rem;
            font-size: 0.95rem;
            color: #666;
        }

        .register-link a {
            color: #417fde;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login-container">
    <!-- 🏷️ 북팡문고 로고 -->
    <a th:href="@{/}" class="logo">북팡문고</a>

    <h2>로그인</h2>
    <form th:action="@{/login}" method="post">
        <div class="input-group">
            <label for="email">이메일</label>
            <input type="text" id="email" name="email" required />
        </div>
        <div class="input-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" required />
        </div>
        <button type="submit" class="login-button">로그인</button>
    </form>
    <div class="register-link">
        계정이 없으신가요? <a th:href="@{/register}">회원가입</a>
    </div>
</div>
<script th:inline="javascript">
    /*<![CDATA[*/
    let errorMsg = [[${errorMessage != null}]] ? [[${errorMessage}]] : null;
    if (errorMsg) {
        alert(errorMsg);
    }
    /*]]>*/
</script>
</body>
</html>
