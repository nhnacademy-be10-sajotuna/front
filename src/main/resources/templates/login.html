<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>로그인</title>
    <style>
        .login-container {
            background-color: white;
            padding: 3rem 2rem;
            border-radius: 1.2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            display: block;
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            text-decoration: none;
            margin-bottom: 2rem;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: #333;
        }

        .input-group {
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-group label {
            width: 80%;
            text-align: left;
            margin-bottom: 0.3rem;
            font-weight: 600;
            color: #555;
        }

        .input-group input {
            width: 80%;
            padding: 0.8rem;
            border-radius: 0.5rem;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        .payco-btn {
            margin-top: 1.2rem;
            width: 100%;
            max-width: 100%;
            height: auto;
        }

        .login-button {
            margin-top: 1.2rem;
            width: 100%;
            padding: 0.9rem;
            background-color: #5c9ded;
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-button:hover {
            background-color: #417fde;
        }

        .register-link {
            margin-top: 1rem;
            font-size: 0.95rem;
            color: #666;
        }

        .register-link a {
            color: #417fde;
            text-decoration: none;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
<section layout:fragment="content">
    <div class="login-container">
        <a th:href="@{/}" class="logo">북팡문고</a>
        <h2>로그인</h2>
        <form th:action="@{/login}" method="post">
            <div class="input-group">
                <label for="email">이메일</label>
                <input type="text" id="email" name="email" required />
            </div>
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required />
            </div>
            <button type="submit" class="login-button">로그인</button>
        </form>
        <a href="https://nhn-team04.shop/account-api/oauth2/authorization/payco">
            <img src="/payco/paycoBtn.png" alt="페이코 로그인" class="payco-btn">
        </a>
        <div class="register-link">
            계정이 없으신가요? <a th:href="@{/register}">회원가입</a>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        let errorMsg = [[${errorMessage != null}]] ? [[${errorMessage}]] : null;
        if (errorMsg) {
            alert(errorMsg);
        }
        /*]]>*/
    </script>
</section>
</body>
</html>
