<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 정보</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #dbe9f4); /* ✅ 부드러운 밝은 그라디언트 */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-card {
            background-color: #fff;
            padding: 2.5rem;
            border-radius: 1.2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            width: 400px;
        }

        .profile-card h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }

        .info-group {
            margin-bottom: 1rem;
        }

        .info-group strong {
            display: block;
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 0.3rem;
        }

        .info-group span {
            font-size: 1.1rem;
            color: #333;
        }

        .grade-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f0f8ff;
            border-left: 5px solid #5c9ded;
            border-radius: 0.5rem;
        }

        .grade-box p {
            margin: 0.4rem 0;
            color: #444;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
<div class="profile-card">
    <h2 th:text="${user.name} + ' 님의 정보'">회원 정보</h2>

    <div class="info-group">
        <strong>이메일</strong>
        <span th:text="${user.email}">qwer12345@naver.com</span>
    </div>

    <div class="info-group">
        <strong>전화번호</strong>
        <span th:text="${user.phoneNumber}">010-2222-3333</span>
    </div>

    <div class="info-group">
        <strong>생년월일</strong>
        <span th:text="${#temporals.format(user.birthDate, 'yyyy-MM-dd')}">1996-06-01</span>
    </div>

    <div class="info-group">
        <strong>가입일</strong>
        <span th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}">2025-06-17</span>
    </div>

    <div class="info-group">
        <strong>최근 로그인</strong>
        <span th:text="${#temporals.format(user.currentLoginAt, 'yyyy-MM-dd HH:mm')}">2025-06-17</span>
    </div>

    <div class="info-group">
        <strong>회원 상태</strong>
        <span th:text="${user.status}">ACTIVE</span>
    </div>

    <div class="info-group">
        <strong>인증 방식</strong>
        <span th:text="${user.authType}">LOCAL</span>
    </div>

    <div class="grade-box">
        <strong>등급 정책</strong>
        <p>최소 금액: <span th:text="${user.userGradePolicyDto.minAmount}">0</span>원</p>
        <p>최대 금액: <span th:text="${user.userGradePolicyDto.maxAmount}">100000</span>원</p>
        <p>적립률: <span th:text="${user.userGradePolicyDto.pointEarningRate * 100}">1.0</span>%</p>
    </div>
</div>
</body>
</html>
