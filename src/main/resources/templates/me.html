<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>회원 정보</title>
    <style>
        .profile-card {
            background-color: #fff;
            padding: 2.5rem;
            border-radius: 1.2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            width: 400px;
            max-width: 90vw; /* 모바일 등에서 좌우 넘침 방지 */
            box-sizing: border-box;
        }

        .profile-card h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }

        .info-group {
            margin-bottom: 1rem;
        }

        .info-group strong {
            display: block;
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 0.3rem;
        }

        .info-group span {
            font-size: 1.1rem;
            color: #333;
        }

        .grade-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #f0f8ff;
            border-left: 5px solid #5c9ded;
            border-radius: 0.5rem;
        }

        .grade-box p {
            margin: 0.4rem 0;
            color: #444;
            font-size: 0.95rem;
        }

        .withdraw-button {
            margin-top: 2rem;
            width: 100%;
            padding: 0.8rem;
            background-color: #dc3545;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .withdraw-button:hover {
            background-color: #c82333;
        }

        .address-link {
            margin-top: 2rem;
            text-align: center;
        }

        .address-link a {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background-color: #5c9ded;
            color: white;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .address-link a:hover {
            background-color: #417fde;
        }
    </style>
</head>
<body>
<section layout:fragment="content">
    <div class="profile-card">
        <h2 th:text="${user.name} + ' 님의 정보'">회원 정보</h2>

        <div class="info-group">
            <strong>이메일</strong>
            <span th:text="${user.email}">qwer12345@naver.com</span>
        </div>

        <div class="info-group">
            <strong>전화번호</strong>
            <span th:text="${user.phoneNumber}">010-2222-3333</span>
        </div>

        <div class="info-group">
            <strong>생년월일</strong>
            <span th:text="${#temporals.format(user.birthDate, 'yyyy-MM-dd')}">1996-06-01</span>
        </div>

        <div class="info-group">
            <strong>가입일</strong>
            <span th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}">2025-06-17</span>
        </div>

        <div class="info-group">
            <strong>최근 로그인</strong>
            <span th:text="${#temporals.format(user.currentLoginAt, 'yyyy-MM-dd HH:mm')}">2025-06-17</span>
        </div>

        <div class="info-group">
            <strong>회원 상태</strong>
            <span th:text="${user.status}">ACTIVE</span>
        </div>

        <div class="info-group">
            <strong>인증 방식</strong>
            <span th:text="${user.authType}">LOCAL</span>
        </div>

        <div class="grade-box">
            <strong>등급 정책</strong>
            <p>최소 금액: <span th:text="${user.userGradePolicyDto.minAmount}">0</span>원</p>
            <p>최대 금액: <span th:text="${user.userGradePolicyDto.maxAmount}">100000</span>원</p>
            <p>적립률: <span th:text="${user.userGradePolicyDto.pointEarningRate * 100}">1.0</span>%</p>
        </div>

        <div class="address-link">
            <a th:href="@{/address}">주소 관리</a>
        </div>

        <form th:action="@{/withdraw}" method="post" onsubmit="return confirm('정말로 회원 탈퇴하시겠습니까?');">
            <input type="hidden" name="_method" value="delete" />
            <button type="submit" class="withdraw-button">회원 탈퇴</button>
        </form>
    </div>
</section>
</body>
</html>
