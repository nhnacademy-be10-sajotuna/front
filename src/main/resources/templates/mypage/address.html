<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/mypage-layout}"
      th:with="activeMenu='address'">
<head>
    <title>주소 관리 - 마이페이지</title>
</head>
<body>
<section layout:fragment="page-content">
    <h2 class="page-header">주소 관리</h2>

    <div th:if="${addressList != null and !addressList.isEmpty()}" class="card" style="padding: 0;">
        <div th:each="address : ${addressList}" class="address-item">
            <div class="address-info">
                <div class="address-nickname" th:text="${address.nickName}">별칭</div>
                <div class="address-detail" th:text="${address.streetAddress}">주소</div>
            </div>
            <div class="address-actions">
                <form th:action="@{'/my-page/address/' + ${address.id}}" method="post" onsubmit="return confirm('정말 삭제하시겠습니까?');">
                    <input type="hidden" name="_method" value="delete"/>
                    <button type="submit" class="btn btn--danger">삭제</button>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${addressList == null or addressList.isEmpty()}" class="empty-state">
        <h3>등록된 주소가 없습니다</h3>
        <p>새로운 주소를 추가해보세요.</p>
    </div>

    <div class="card" id="addAddressForm">
        <h3 class="card__title">새 주소 추가</h3>
        <form th:action="@{/my-page/address}" method="post">
            <div class="form-row">
                <div class="form-group">
                    <label for="nickName">주소 별칭 *</label>
                    <input type="text" id="nickName" name="nickName" placeholder="예: 집, 회사" required/>
                </div>
                <div class="form-group">
                    <label for="streetAddress">주소 *</label>
                    <input type="text" id="streetAddress" name="streetAddress" placeholder="상세 주소를 입력하세요" required/>
                </div>
            </div>
            <div style="text-align: right; margin-top: 1rem;">
                <button type="submit" class="btn btn--primary">주소 추가</button>
            </div>
        </form>
    </div>
</section>

<th:block layout:fragment="script">
</th:block>
</body>
</html>
