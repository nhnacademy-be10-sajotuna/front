<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>내 쿠폰 - 마이페이지</title>
    <style>
        /* layout.html의 main 스타일 오버라이드 */
        main {
            padding: 0 !important;
            background: linear-gradient(135deg, #f5f7fa, #dbe9f4) !important;
            display: block !important;
            justify-content: unset !important;
            align-items: unset !important;
        }
        
        .mypage-container {
            display: flex;
            gap: 0;
            min-height: 100vh;
            width: 100%;
        }

        .sidebar {
            width: 250px;
            background-color: #fff;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            height: calc(100vh - 60px);
            position: fixed;
            left: 0;
            top: 60px;
            overflow-y: auto;
        }

        .sidebar h3 {
            color: #333;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #5c9ded;
            padding-bottom: 0.5rem;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-menu li {
            margin-bottom: 0.5rem;
        }

        .sidebar-menu a {
            display: block;
            padding: 0.8rem 1rem;
            color: #666;
            text-decoration: none;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background-color: #5c9ded;
            color: white;
        }

        .content-area {
            flex: 1;
            background-color: #fff;
            padding: 2rem;
            margin-left: 250px;
            margin-top: 60px;
            min-height: calc(100vh - 60px);
            width: calc(100% - 250px);
        }

        .content-area h2 {
            color: #333;
            margin-bottom: 2rem;
            border-bottom: 2px solid #5c9ded;
            padding-bottom: 0.5rem;
        }

        .coupon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .coupon-card {
            background: linear-gradient(135deg, #5c9ded 0%, #417fde 100%);
            color: white;
            padding: 2rem;
            border-radius: 1rem;
            position: relative;
            overflow: hidden;
        }

        .coupon-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(30%, -30%);
        }

        .coupon-card h3 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .coupon-card p {
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }

        .coupon-expired {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        }

        .coupon-status {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.8rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .empty-state img {
            width: 100px;
            height: 100px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                height: auto;
            }
            
            .content-area {
                margin-left: 0;
                width: 100%;
            }
            
            .coupon-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<section layout:fragment="content">
    <div class="mypage-container">
        <div class="sidebar">
            <h3>마이페이지</h3>
            <ul class="sidebar-menu">
                <li><a href="/my-page">대시보드</a></li>
                <li><a href="/my-page/profile">회원 정보</a></li>
                <li><a href="/my-page/order-list">주문 내역</a></li>
                <li><a href="/my-page/address">주소 관리</a></li>
                <li><a href="/my-page/point-history">포인트 내역</a></li>
                <li><a href="/my-page/coupons" class="active">내 쿠폰</a></li>
            </ul>
        </div>

        <div class="content-area">
            <h2>내 쿠폰</h2>

            <div th:if="${coupons != null and #lists.size(coupons) > 0}">
                <div class="coupon-grid">
                    <div th:each="coupon : ${coupons}" 
                         th:class="${coupon.isExpired} ? 'coupon-card coupon-expired' : 'coupon-card'">
                        <div class="coupon-status" th:text="${coupon.isExpired} ? '만료됨' : '사용가능'">사용가능</div>
                        <h3 th:text="${coupon.name}">10% 할인 쿠폰</h3>
                        <p th:text="'할인: ' + ${coupon.discountAmount} + '원'">할인: 5000원</p>
                        <p th:text="'최소 주문금액: ' + ${coupon.minOrderAmount} + '원'">최소 주문금액: 50000원</p>
                        <p th:text="'유효기간: ' + ${#temporals.format(coupon.expiredAt, 'yyyy-MM-dd')}">유효기간: 2025-12-31</p>
                    </div>
                </div>
            </div>

            <div th:if="${coupons == null or #lists.size(coupons) == 0}" class="empty-state">
                <p>보유한 쿠폰이 없습니다.</p>
                <p>이벤트나 프로모션을 통해 쿠폰을 받아보세요!</p>
            </div>
        </div>
    </div>
</section>
</body>
</html>
