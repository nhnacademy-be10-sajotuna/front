<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/mypage-layout}"
      th:with="activeMenu='coupons'">
<head>
    <title>내 쿠폰 - 마이페이지</title>
</head>
<body>
<section layout:fragment="page-content">
    <h2 class="page-header">내 쿠폰</h2>

    <div class="tabs">
        <button class="tab-item active" onclick="showTab(this, 'available')">사용가능<span class="count" id="available-count">0</span></button>
        <button class="tab-item" onclick="showTab(this, 'used')">사용완료<span class="count" id="used-count">0</span></button>
        <button class="tab-item" onclick="showTab(this, 'expired')">만료됨<span class="count" id="expired-count">0</span></button>
    </div>

    <div id="available-tab" class="tab-content active">
        <div class="coupon-grid" id="available-grid">
            <div th:each="coupon : ${coupons}" th:if="${coupon.status.name() == 'AVAILABLE'}" class="card coupon-card">
            </div>
        </div>
        <div id="available-empty" class="empty-state" style="display: none;"><p>사용가능한 쿠폰이 없습니다.</p></div>
    </div>

    <div id="used-tab" class="tab-content">
        <div class="coupon-grid" id="used-grid">
            <div th:each="coupon : ${coupons}" th:if="${coupon.status.name() == 'USED'}" class="card coupon-card expired">
            </div>
        </div>
        <div id="used-empty" class="empty-state" style="display: none;"><p>사용완료된 쿠폰이 없습니다.</p></div>
    </div>

    <div id="expired-tab" class="tab-content">
        <div class="coupon-grid" id="expired-grid">
            <div th:each="coupon : ${coupons}" th:if="${coupon.status.name() == 'EXPIRED'}" class="card coupon-card expired">
            </div>
        </div>
        <div id="expired-empty" class="empty-state" style="display: none;"><p>만료된 쿠폰이 없습니다.</p></div>
    </div>
</section>

<th:block layout:fragment="script">
    <script>
        function showTab(clickedButton, tabName) {
            document.querySelectorAll('.tab-item').forEach(button => button.classList.remove('active'));
            clickedButton.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabName + '-tab').classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', function() {
            const statuses = ['available', 'used', 'expired'];
            statuses.forEach(status => {
                const grid = document.getElementById(`${status}-grid`);
                const count = grid ? grid.children.length : 0;
                document.getElementById(`${status}-count`).textContent = count;
                if (count === 0) {
                    if(grid) grid.style.display = 'none';
                    document.getElementById(`${status}-empty`).style.display = 'block';
                }
            });
        });
    </script>
</th:block>
</body>
</html>
