<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/mypage-layout}"
      th:with="activeMenu='liked-books'">
<head>
  <title>찜한 책</title>
  <style>
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }
    
    .book-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 1.5rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 1px solid #e5e7eb;
    }
    
    .book-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }
    
    .book-image {
      width: 100%;
      text-align: center;
      margin-bottom: 1rem;
    }
    
    .book-image img {
      max-width: 150px;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    
    .book-info h3 {
      font-size: 1.125rem;
      font-weight: 700;
      color: #2d3748;
      margin: 0 0 0.5rem 0;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .book-meta {
      color: #6b7280;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
    
    .book-meta p {
      margin: 0.25rem 0;
    }
    
    .book-price {
      font-size: 1.125rem;
      font-weight: 700;
      color: #059669;
      margin-bottom: 1rem;
    }
    
    .book-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    
    .btn-book {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      text-decoration: none;
      text-align: center;
      font-weight: 600;
      font-size: 0.875rem;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: white;
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      transform: translateY(-1px);
    }
    
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
    }
    
    .btn-secondary:hover {
      background: #e5e7eb;
      transform: translateY(-1px);
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .empty-state h3 {
      color: #6b7280;
      font-size: 1.25rem;
      margin-bottom: 1rem;
    }
    
    .empty-state p {
      color: #9ca3af;
      margin-bottom: 2rem;
    }
    
    .like-icon {
      color: #e91e63;
      font-size: 1.2rem;
      margin-right: 0.3rem;
    }
  </style>
</head>
<body>
<section layout:fragment="page-content">
  <h2 class="page-header">좋아요 목록</h2>

  <div th:if="${message}" th:text="${message}" class="info-note"></div>
  <div th:if="${errorMessage}" th:text="${errorMessage}" class="info-note" style="border-color: var(--color-danger); background-color: #fbe9e9;"></div>

  <div th:if="${not #lists.isEmpty(likedBooks)}" class="book-grid">
    <div th:each="book : ${likedBooks}" class="book-card">
      <div class="book-image">
        <img th:src="${book.imageUrl}" onerror="this.src='/image/logo.png'" th:alt="${book.title}" />
      </div>
      
      <div class="book-info">
        <h3 th:text="${book.title}">책 제목</h3>
        
        <div class="book-meta">
          <p><strong>저자:</strong> <span th:text="${book.author}">저자명</span></p>
          <p><strong>출판사:</strong> <span th:text="${book.publisher}">출판사</span></p>
          <p><strong>출간일:</strong> <span th:text="${#temporals.format(book.publicationDate, 'yyyy-MM-dd')}">출간일</span></p>
          <p th:if="${book.averageRating != null}">
            <strong>평점:</strong> 
            <span th:each="i : ${#numbers.sequence(1, 5)}" 
                  th:text="${i <= book.averageRating} ? '★' : '☆'"
                  th:style="${i <= book.averageRating} ? 'color: #ffc107;' : 'color: #dee2e6;'"></span>
            <span th:text="${#numbers.formatDecimal(book.averageRating, 1, 1)}">0.0</span>
          </p>
        </div>
        
        <div class="book-price">
          <span th:if="${book.discountRate > 0}">
            <del th:text="${#numbers.formatDecimal(book.originalPrice, 0, 'COMMA', 0, 'POINT')} + '원'" style="color: #9ca3af; font-size: 0.875rem; margin-right: 0.5rem;"></del>
            <span th:text="${#numbers.formatDecimal(book.sellingPrice, 0, 'COMMA', 0, 'POINT')} + '원'"></span>
            <span style="background: #dc2626; color: white; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; margin-left: 0.5rem;" 
                  th:text="${#numbers.formatDecimal(book.discountRate, 0, 0)} + '% 할인'"></span>
          </span>
          <span th:unless="${book.discountRate > 0}" th:text="${#numbers.formatDecimal(book.sellingPrice, 0, 'COMMA', 0, 'POINT')} + '원'"></span>
        </div>
        
        <div class="book-actions">
          <a th:href="@{/book/detail/{isbn}(isbn=${book.isbn})}" class="btn-book btn-primary">상세보기</a>
          <button type="button" 
                  class="btn-book btn-secondary" 
                  th:data-isbn="${book.isbn}"
                  th:data-user-id="${user.id}"
                  onclick="removeLikeFromMyPage(this)">찜 해제</button>
        </div>
      </div>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(likedBooks)}" class="empty-state">
    <h3>찜한 책이 없습니다</h3>
    <p>마음에 드는 책을 찜해보세요!</p>
    <a href="/" class="btn-book btn-primary" style="display: inline-block; text-decoration: none;">책 둘러보기</a>
  </div>

  <script>
    function removeLikeFromMyPage(button) {
      const isbn = button.dataset.isbn;
      const userId = button.dataset.userId;
      
      if (!confirm('찜 목록에서 이 책을 삭제하시겠습니까?')) {
        return;
      }
      
      button.disabled = true;
      button.textContent = '처리중...';
      
      fetch('/api/likes?bookIsbn=' + isbn, {
        method: 'DELETE',
        headers: {
          'Content-Type': 'application/json',
          'X-User-Id': userId
        }
      })
      .then(response => {
        if (!response.ok) {
          throw new Error('찜 해제에 실패했습니다.');
        }
        
        // 성공하면 해당 카드를 페이지에서 제거
        const bookCard = button.closest('.book-card');
        bookCard.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        bookCard.style.opacity = '0';
        bookCard.style.transform = 'scale(0.95)';
        
        setTimeout(() => {
          bookCard.remove();
          
          // 모든 책이 제거되었으면 페이지 새로고침하여 빈 상태 표시
          const remainingCards = document.querySelectorAll('.book-card');
          if (remainingCards.length === 0) {
            location.reload();
          }
        }, 300);
      })
      .catch(error => {
        console.error('찜 해제 오류:', error);
        alert('찜 해제에 실패했습니다. 다시 시도해주세요.');
        button.disabled = false;
        button.textContent = '찜 해제';
      });
    }
  </script>
</section>
</body>
</html>
