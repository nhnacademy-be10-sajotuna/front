<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/mypage-layout}"
      th:with="activeMenu='dashboard'">
<head>
    <title>마이페이지</title>
</head>
<body>
<section layout:fragment="page-content">
    <div class="welcome-section">
        <h1>안녕하세요!</h1>
        <p>마이페이지에 오신 것을 환영합니다.</p>
    </div>

    <div class="quick-menu">
        <a href="/my-page/profile" class="card">
            <h3 class="card__title">회원 정보</h3>
            <p class="card__text">개인정보 및 등급 정보를 확인하고 관리하세요</p>
        </a>
        <a href="/my-page/order-list" class="card">
            <h3 class="card__title">주문 내역</h3>
            <p class="card__text">주문 내역 및 배송 상태를 확인하세요</p>
        </a>
        <a href="/my-page/address" class="card">
            <h3 class="card__title">주소 관리</h3>
            <p class="card__text">배송지 주소를 등록하고 관리하세요</p>
        </a>
        <a href="/my-page/point-history" class="card">
            <h3 class="card__title">포인트 내역</h3>
            <p class="card__text">포인트 적립 및 사용 내역을 확인하세요</p>
        </a>
        <a href="/my-page/coupons" class="card">
            <h3 class="card__title">내 쿠폰</h3>
            <p class="card__text">사용 가능한 쿠폰을 확인하고 관리하세요</p>
        </a>
        <a href="/my-page/reviews" class="card">
            <h3 class="card__title">내 리뷰</h3>
            <p class="card__text">작성한 리뷰를 확인하고 관리하세요</p>
        </a>
    </div>
</section>
</body>
</html>
