<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/mypage-layout}"
      th:with="activeMenu='points'">
<head>
    <title>포인트 내역 - 마이페이지</title>
</head>
<body>
<section layout:fragment="page-content">
    <h2 class="page-header">포인트 내역</h2>

    <div class="card point-summary">
        <h3>현재 보유 포인트</h3>
        <p th:text="(${availablePoint} ?: 0) + ' P'">0 P</p>
    </div>

    <div th:if="${pointHistory != null and !pointHistory.isEmpty()}">
        <table class="data-table">
            <thead>
            <tr><th>날짜</th><th>내용</th><th>포인트</th></tr>
            </thead>
            <tbody>
            <tr th:each="point : ${pointHistory}">
                <td th:text="${#temporals.format(point.createdAt, 'yyyy-MM-dd HH:mm')}">2025-01-01 12:00</td>
                <td th:text="${point.description}">주문 적립</td>
                <td th:classappend="${point.type.name() == 'EARNED'} ? 'point-earned' : 'point-used'">
                    <span th:if="${point.type.name() == 'EARNED'}" th:text="'+' + ${point.amount}">+100</span>
                    <span th:if="${point.type.name() == 'REDEEMED'}" th:text="'-' + ${point.amount}">-100</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${pointHistory == null or pointHistory.isEmpty()}" class="empty-state">
        <h3>포인트 내역이 없습니다</h3>
        <p>쇼핑몰에서 구매하시면 포인트가 적립됩니다.</p>
    </div>

    <!-- 페이징 네비게이션 -->
    <div th:if="${pointHistory != null and !pointHistory.isEmpty() and totalPages > 1}" class="pagination">
        <!-- 첫 페이지로 -->
        <a th:if="${currentPage > 0}" 
           th:href="@{/my-page/point-history(page=0, size=${size})}" 
           title="첫 페이지">«</a>
        <span th:if="${currentPage == 0}" class="disabled">«</span>
        
        <!-- 이전 페이지 -->
        <a th:if="${currentPage > 0}" 
           th:href="@{/my-page/point-history(page=${currentPage - 1}, size=${size})}" 
           title="이전 페이지">‹</a>
        <span th:if="${currentPage == 0}" class="disabled">‹</span>
        
        <!-- 페이지 번호들 -->
        <th:block th:each="pageNum : ${#numbers.sequence(startPage, endPage)}">
            <a th:if="${pageNum != currentPage}" 
               th:href="@{/my-page/point-history(page=${pageNum}, size=${size})}" 
               th:text="${pageNum + 1}">1</a>
            <span th:if="${pageNum == currentPage}" 
                  class="current" 
                  th:text="${pageNum + 1}">1</span>
        </th:block>
        
        <!-- 다음 페이지 -->
        <a th:if="${currentPage < totalPages - 1}" 
           th:href="@{/my-page/point-history(page=${currentPage + 1}, size=${size})}" 
           title="다음 페이지">›</a>
        <span th:if="${currentPage >= totalPages - 1}" class="disabled">›</span>
        
        <!-- 마지막 페이지로 -->
        <a th:if="${currentPage < totalPages - 1}" 
           th:href="@{/my-page/point-history(page=${totalPages - 1}, size=${size})}" 
           title="마지막 페이지">»</a>
        <span th:if="${currentPage >= totalPages - 1}" class="disabled">»</span>
    </div>
    
    <!-- 페이지 정보 표시 -->
    <div th:if="${pointHistory != null and !pointHistory.isEmpty()}" 
         style="text-align: center; margin-top: 1rem; color: #666; font-size: 0.9rem;">
        <span th:text="${currentPage + 1} + ' / ' + ${totalPages} + ' 페이지'">1 / 5 페이지</span>
    </div>
</section>
</body>
</html>
