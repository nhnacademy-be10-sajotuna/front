<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/mypage-layout}"
      th:with="activeMenu='points'">
<head>
    <title>포인트 내역 - 마이페이지</title>
</head>
<body>
<section layout:fragment="page-content">
    <h2 class="page-header">포인트 내역</h2>

    <div class="card point-summary">
        <h3>현재 보유 포인트</h3>
        <p th:text="${availablePoint} + ' P'">0 P</p>
    </div>

    <div th:if="${pointHistory != null and !pointHistory.isEmpty()}">
        <table class="data-table">
            <thead>
            <tr><th>날짜</th><th>내용</th><th>포인트</th></tr>
            </thead>
            <tbody>
            <tr th:each="point : ${pointHistory}">
                <td th:text="${#temporals.format(point.createdAt, 'yyyy-MM-dd HH:mm')}">2025-01-01 12:00</td>
                <td th:text="${point.description}">주문 적립</td>
                <td th:classappend="${point.type.name() == 'EARNED'} ? 'point-earned' : 'point-used'">
                    <span th:if="${point.type.name() == 'EARNED'}" th:text="'+' + ${point.amount}">+100</span>
                    <span th:if="${point.type.name() == 'REDEEMED'}" th:text="'-' + ${point.amount}">-100</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${pointHistory == null or pointHistory.isEmpty()}" class="empty-state">
        <h3>포인트 내역이 없습니다</h3>
        <p>쇼핑몰에서 구매하시면 포인트가 적립됩니다.</p>
    </div>

    <div th:if="${pointHistory != null and !pointHistory.isEmpty()}" class="pagination">
    </div>
</section>
</body>
</html>
