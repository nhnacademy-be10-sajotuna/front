<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/mypage-layout}"
      th:with="activeMenu='profile'">
<head>
    <title>회원 정보 수정 - 마이페이지</title>
</head>
<body>
<section layout:fragment="page-content">
    <h2 class="page-header">회원 정보 수정</h2>
    <div class="info-note">
        <strong>안내:</strong> 이메일과 생년월일은 보안상 수정할 수 없습니다. 변경이 필요한 경우 고객센터에 문의해주세요.
    </div>

    <form class="card" th:action="@{/my-page/profile/edit}" method="post">
        <input type="hidden" name="birthDate" th:value="${user.birthDate}">
        <div class="form-row">
            <div class="form-group">
                <label for="name">이름 *</label>
                <input type="text" id="name" name="name" th:value="${user.name}" required>
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" th:value="${user.email}" disabled>
            </div>
        </div>
        <div class="button-group">
            <button type="submit" class="btn btn--primary">정보 수정</button>
            <a th:href="@{/my-page/profile}" class="btn btn--secondary">취소</a>
        </div>
    </form>
</section>

<th:block layout:fragment="script">
</th:block>
</body>
</html>
