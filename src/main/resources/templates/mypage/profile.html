<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/mypage-layout}"
      th:with="activeMenu='profile'">
<head>
    <title>회원 정보 - 마이페이지</title>
</head>
<body>
<section layout:fragment="page-content">
    <h2 class="page-header">회원 정보</h2>

    <div class="card">
        <div class="profile-info-grid">
            <div class="info-group">
                <strong>이메일</strong>
                <span th:text="${user.email}">qwer12345@naver.com</span>
            </div>
            <div class="info-group">
                <strong>인증 방식</strong>
                <span th:text="${user.authType}">LOCAL</span>
            </div>
            <div class="grade-box">
                <strong>등급 정책</strong>
                <p>등급: <span th:text="${user.userGradePolicyDto.grade}">GENERAL</span></p>
                <p>최소 금액: <span th:text="${user.userGradePolicyDto.minTotalOrderPrice}">0</span>원</p>
                <p>최대 금액: <span th:text="${user.userGradePolicyDto.maxTotalOrderPrice}">100000</span>원</p>
                <p>적립률: <span th:text="${user.userGradePolicyDto.pointRate}">1</span>%</p>
            </div>
        </div>
    </div>

    <div class="button-group">
        <a th:href="@{/my-page/profile/edit}" class="btn btn--primary">회원 정보 수정</a>
        <form th:action="@{/withdraw}" method="post" onsubmit="return confirm('정말로 회원 탈퇴하시겠습니까?');" style="display: inline;">
            <input type="hidden" name="_method" value="delete" />
            <button type="submit" class="btn btn--danger">회원 탈퇴</button>
        </form>
    </div>
</section>
</body>
</html>
