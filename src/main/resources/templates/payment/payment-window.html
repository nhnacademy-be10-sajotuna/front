<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="utf-8" />
    <title>결제 창</title>
    <!-- 토스페이먼츠 결제창 SDK 추가 -->
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <style>
        .payment-container {
            background-color: white;
            padding: 3rem 2rem;
            border-radius: 1.2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .payment-button {
            margin-top: 1.2rem;
            width: 100%;
            padding: 0.9rem;
            background-color: #5c9ded;
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .payment-button:hover {
            background-color: #417fde;
        }

        h2 {
            margin-bottom: 50px;
        }
    </style>
</head>

<body>
<!-- 결제하기 버튼 -->
    <main layout:fragment="content">
        <div class="payment-container">
            <h2>결제하기</h2>

            <p><strong>주문 번호</strong>: <span th:text="${orderNumber}"></span></p>
            <p><strong>총 결제 금액</strong>: <span th:text="${amount}"></span>원</p>

            <form method="post" action="/payment">
                <input type="hidden" id="orderNumber" name="orderNumber" th:value="${orderNumber}">
                <input type="hidden" id="amount" name="amount" th:value="${amount}">

                <button class="payment-button" type="submit">일반 결제하기</button>
            </form>

            <button class="payment-button" onclick="tossPayment()">토스 결제하기</button>
        </div>

        <script type="text/javascript">
            const num = document.getElementById('orderNumber').value;
            const price = document.getElementById('amount').value;

            function tossPayment() {
                const clientKey = "test_ck_yZqmkKeP8gWj1B0QjXRB8bQRxB9l";
                const tossPayments = TossPayments(clientKey);
                const payment = tossPayments.payment({customerKey: TossPayments.ANONYMOUS})

                // 토스 결제
                payment.requestPayment({
                    method: "CARD",
                    amount: {
                        currency: "KRW",
                        value: Number(price),
                    },
                    orderId: num,
                    orderName: "책",
                    successUrl: window.location.origin + "/payment/toss/success",
                    failUrl: window.location.origin + "/payment/fail",
                    customerName: "",
                    card: {
                        useEscrow: false,
                        flowMode: "DEFAULT",
                        useCardPoint: false,
                        useAppCardOnly: false,
                    },
                });
            }
        </script>
    </main>
</body>
</html>
