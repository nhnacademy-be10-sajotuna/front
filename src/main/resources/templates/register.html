<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>회원가입</title>
    <style>
        .register-container {
            background-color: white;
            padding: 3rem 2rem;
            border-radius: 1.2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            display: block;
            font-size: 2rem;
            font-weight: bold;
            color: #333;
            text-decoration: none;
            margin-bottom: 2rem;
        }

        h2 {
            margin-bottom: 1.5rem;
            color: #333;
        }

        .input-group {
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-group label {
            width: 80%;
            text-align: left;
            margin-bottom: 0.3rem;
            font-weight: 600;
            color: #555;
        }

        .input-group input {
            width: 80%;
            padding: 0.8rem;
            border-radius: 0.5rem;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        .register-button {
            margin-top: 1.2rem;
            width: 100%;
            padding: 0.9rem;
            background-color: #5c9ded;
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .register-button:hover {
            background-color: #417fde;
        }

        .login-link {
            margin-top: 1rem;
            font-size: 0.95rem;
            color: #666;
        }

        .login-link a {
            color: #417fde;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<section layout:fragment="content">
    <div class="register-container">
        <a th:href="@{/}" class="logo">북팡문고</a>

        <h2>회원가입</h2>
        <form th:action="@{/register}" method="post">
            <div class="input-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" required />
            </div>
            <div class="input-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" required />
            </div>
            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" required />
            </div>
            <div class="input-group">
                <label for="birthDate">생일</label>
                <input type="date" id="birthDate" name="birthDate" required />
            </div>

            <div class="input-group">
                <label for="phoneNumber">전화번호</label>
                <input type="text" id="phoneNumber" name="phoneNumber" placeholder="000-0000-0000"
                       pattern="\d{3}-\d{4}-\d{4}" required />
            </div>

            <div class="input-group">
                <label for="address">주소</label>
                <input type="text" id="address" name="address" />
            </div>
            <button type="submit" class="register-button">회원가입</button>
        </form>
        <div class="login-link">
            이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        let errorMsg = [[${errorMessage != null}]] ? [[${errorMessage}]] : null;
        if (errorMsg) {
            alert(errorMsg);
        }
        /*]]>*/
    </script>
</section>
</body>
</html>
