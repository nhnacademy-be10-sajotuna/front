<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>리뷰 수정</title>
  <link rel="stylesheet" type="text/css" th:href="@{/css/review.css}">
</head>
<body>
<section layout:fragment="content">
  <div class="review-container">
    <h2 class="review-container__title">리뷰 수정</h2>

    <form th:action="@{|/reviews/${review.id}/edit|}" th:object="${reviewUpdateRequest}" method="post" enctype="multipart/form-data" class="review-form">
      <div th:if="${#fields.hasErrors('*')}" class="alert alert--error">
        <p th:each="err : ${#fields.errors('*')}" th:text="${err}"></p>
      </div>
      <div th:if="${errorMessage}" th:text="${errorMessage}" class="alert alert--error"></div>

      <input type="hidden" name="isbn" th:value="${isbn}"/>
      <input type="hidden" name="oldFilePath" th:value="${review.filePath}" />

      <div th:replace="~{fragments/form_fields :: reviewForm}"></div>

      <div class="form-group current-image" th:if="${review.filePath}">
        <label class="form-group__label">기존 사진</label>
        <img th:src="@{|/images/${review.filePath}|}" alt="기존 리뷰 이미지"/>
      </div>
      <div class="form-group" th:if="${review.filePath == null}">
        <label class="form-group__label">기존 사진</label>
        <span>첨부된 사진이 없습니다.</span>
      </div>

      <div class="form-actions">
        <a th:href="@{|/reviews?isbn=${isbn}|}" class="btn btn--secondary btn--block">목록으로</a>
        <button type="submit" class="btn btn--primary btn--block">리뷰 수정</button>
      </div>
    </form>
  </div>

  <script th:src="@{/js/review.js}"></script>
</section>
</body>
</html>
