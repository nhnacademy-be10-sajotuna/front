<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>리뷰 목록</title>
  <link rel="stylesheet" type="text/css" th:href="@{/css/review.css}">
  <style>
    .star-rating {
      color: #f8ce0b;
    }
  </style>
</head>
<body>
<section layout:fragment="content">
  <div class="review-container review-list-container">
    <h2>리뷰 목록</h2>

    <div th:if="${message}" th:text="${message}" class="message"></div>
    <div th:if="${errorMessage}" th:text="${errorMessage}" class="error-message"></div>

    <table class="review-table">
      <thead>
      <tr>
        <th>평점</th>
        <th>내용</th>
        <th>사진</th>
        <th>작성자</th>
        <th>작성일</th>
        <th>관리</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="review : ${reviews}">
        <td>
          <span class="star-rating">
            <span th:each="i : ${#numbers.sequence(1, 5)}" th:text="${i <= review.rating} ? '★' : '☆'"></span>
          </span>
        </td>
        <td th:text="${review.content}">리뷰 내용입니다.</td>
        <td>
          <img th:if="${review.filePath != null}" th:src="@{|/images/${review.filePath}|}" alt="리뷰 이미지" class="review-image-thumbnail"/>
          <span th:if="${review.filePath == null}">-</span>
        </td>
        <td th:text="${review.userId}">user123</td>
        <td th:text="${#temporals.format(review.postedAt, 'yyyy-MM-dd')}">2025-07-03</td>
        <td>
          <div th:if="${review.userId == #authentication.principal.id}">
            <a th:href="@{|/reviews/${review.id}/edit?isbn=${isbn}|}" class="button-link btn-secondary">수정</a>
          </div>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(reviews)}">
        <td colspan="6" style="padding: 2rem;">등록된 리뷰가 없습니다.</td>
      </tr>
      </tbody>
    </table>

    <div class="list-actions-footer">
      <a th:href="@{|/reviews/create?isbn=${isbn}|}" class="action-button btn-primary">리뷰 작성</a>
    </div>
  </div>
</section>
</body>
</html>
