<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>리뷰 목록</title>
  <link rel="stylesheet" type="text/css" th:href="@{/css/review.css}">
</head>
<body>
<section layout:fragment="content">
  <div class="review-container review-list-container">
    <h2 class="review-container__title">리뷰 목록</h2>

    <div th:if="${message}" th:text="${message}" class="alert alert--success"></div>
    <div th:if="${errorMessage}" th:text="${errorMessage}" class="alert alert--error"></div>

    <div class="review-table-wrapper">
      <table class="review-table">
        <thead>
        <tr>
          <th>평점</th>
          <th>내용</th>
          <th>사진</th>
          <th>작성자</th>
          <th>작성일</th>
          <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="review : ${reviews}">
          <td>
            <div class="review-table__stars" aria-label="평점" th:aria-label="|${review.rating}점|">
              <span th:each="i : ${#numbers.sequence(1, 5)}" th:text="${i <= review.rating} ? '★' : '☆'"></span>
            </div>
          </td>
          <td th:text="${review.content}" style="max-width: 400px; white-space: pre-wrap; word-break: break-all;">리뷰 내용입니다.</td>
          <td>
            <img th:if="${review.filePath}" th:src="@{|/image/${review.filePath}|}" alt="리뷰 이미지" class="review-table__image"/>
            <span th:unless="${review.filePath}">-</span>
          </td>
          <td th:text="${review.maskedEmail}">te***@example.com</td>
          <td th:text="${#temporals.format(review.postedAt, 'yyyy-MM-dd')}">2025-07-03</td>
          <td>
            <a th:if="${review.userId == #authentication.principal.id}"
               th:href="@{|/reviews/${review.id}/edit?isbn=${isbn}|}"
               class="btn btn--secondary">수정</a>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(reviews)}">
          <td colspan="6" style="padding: 2.5rem; text-align: center;">등록된 리뷰가 없습니다.</td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="list-actions">
      <a th:href="@{|/reviews/create?isbn=${isbn}|}" class="btn btn--primary">리뷰 작성</a>
    </div>
  </div>
</section>
</body>
</html>
